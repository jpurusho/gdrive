version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gdrive-sync-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/oauth/callback
      - DATABASE_URL=/app/data/sync.db
      - SECRET_KEY=${SECRET_KEY:-default-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ${LOCAL_SYNC_PATH:-./sync}:/sync/local:rw
      - oauth_secrets:/app/secrets:rw
    depends_on:
      - redis
    networks:
      - gdrive-network
    command: python main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gdrive-sync-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gdrive-network
    command: npm start

  redis:
    image: redis:7-alpine
    container_name: gdrive-sync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gdrive-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gdrive-sync-scheduler
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DATABASE_URL=/app/data/sync.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ${LOCAL_SYNC_PATH:-./sync}:/sync/local:rw
      - oauth_secrets:/app/secrets:rw
    depends_on:
      - redis
      - backend
    networks:
      - gdrive-network
    command: python scheduler.py

volumes:
  oauth_secrets:
  redis_data:

networks:
  gdrive-network:
    driver: bridge

secrets:
  google_oauth:
    file: ./secrets/google_oauth.json