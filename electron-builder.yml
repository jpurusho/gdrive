appId: com.gsync.app
productName: gsync
copyright: Copyright © 2026 Jerome Purushotham

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist/oauth-config.json
  - node_modules/**/*
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.{md,ts,map}"
  - "!frontend/**"
  - "!desktop/**"
  - "!shared/**"
  - "!docs/**"
  - "!scripts/**"
  - "!src/**"

mac:
  category: public.app-category.utilities
  icon: resources/icon.icns
  target:
    - target: zip
      arch: [universal]
  darkModeSupport: true
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: jpurusho
  repo: gdrive
